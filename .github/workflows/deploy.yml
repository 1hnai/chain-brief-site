name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway rebuild from latest commit
        run: |
          COMMIT_SHA="${{ github.sha }}"
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"62be3797-9e90-441a-b2b7-7bf70cad0030\\\", environmentId: \\\"2c4098ef-3758-4d18-a10d-6967fecd64d2\\\", latestCommit: true) }\"}")
          echo "Railway response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"serviceInstanceDeploy":true' && echo "Build triggered ✓ for commit $COMMIT_SHA" || (echo "Deploy failed: $RESPONSE" && exit 1)
